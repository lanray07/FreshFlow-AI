name: iOS Xcode Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ios-xcode-release.yml"
      - "FreshFlowAI/**"
      - "FreshFlowAI.xcodeproj/**"

permissions:
  contents: read

concurrency:
  group: ios-xcode-release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: FreshFlowAI
  BUNDLE_ID: com.freshflowai.app
  CONFIGURATION: Release
  PROJECT_PATH: FreshFlowAI.xcodeproj
  SCHEME: FreshFlowAI

jobs:
  archive-upload:
    name: Archive and upload to App Store Connect
    runs-on: macos-26
    timeout-minutes: 75
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || secrets.TEAM_ID || secrets.APP_STORE_CONNECT_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID || secrets.APP_STORE_CONNECT_API_KEY_ID || secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID || secrets.APP_STORE_CONNECT_API_ISSUER_ID || secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY || secrets.APP_STORE_CONNECT_API_PRIVATE_KEY || secrets.APP_STORE_CONNECT_API_KEY || secrets.APPSTORE_CONNECT_PRIVATE_KEY || secrets.APPSTORE_API_PRIVATE_KEY || secrets.APPSTORE_API_KEY || secrets.ASC_PRIVATE_KEY || secrets.ASC_API_PRIVATE_KEY || secrets.ASC_API_KEY || secrets.API_PRIVATE_KEY || secrets.P8_PRIVATE_KEY }}
      ASC_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 || secrets.APP_STORE_CONNECT_API_PRIVATE_KEY_BASE64 || secrets.APP_STORE_CONNECT_API_KEY_BASE64 || secrets.APPSTORE_CONNECT_PRIVATE_KEY_BASE64 || secrets.APPSTORE_API_PRIVATE_KEY_BASE64 || secrets.APPSTORE_API_KEY_BASE64 || secrets.ASC_PRIVATE_KEY_BASE64 || secrets.ASC_API_PRIVATE_KEY_BASE64 || secrets.ASC_API_KEY_BASE64 || secrets.P8_PRIVATE_KEY_BASE64 }}
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 || secrets.BUILD_CERTIFICATE_BASE64 || secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD || secrets.P12_PASSWORD || secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
      APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 || secrets.BUILD_PROVISION_PROFILE_BASE64 || secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || secrets.IOS_KEYCHAIN_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          set -euo pipefail
          xcode_app=""
          for candidate in /Applications/Xcode_26.app /Applications/Xcode_26.[0-9]*.app /Applications/Xcode_26_Release_Candidate.app; do
            if [[ -d "$candidate" && "$candidate" != *beta* && "$candidate" != *Beta* ]]; then
              xcode_app="$candidate"
              break
            fi
          done
          if [[ -z "$xcode_app" ]]; then
            for candidate in /Applications/Xcode_26*.app; do
              if [[ -d "$candidate" ]]; then
                xcode_app="$candidate"
                break
              fi
            done
          fi
          if [[ -z "$xcode_app" ]]; then
            echo "::error::Xcode 26 is required for App Store Connect uploads. Installed Xcode apps:"
            ls -1d /Applications/Xcode*.app || true
            exit 1
          fi
          sudo xcode-select -s "$xcode_app/Contents/Developer"
          echo "Selected $xcode_app"

      - name: Print Xcode version
        run: |
          set -euo pipefail
          xcodebuild -version
          swift --version

      - name: Validate signing and App Store Connect secrets
        run: |
          set -euo pipefail
          missing=0
          for name in APPLE_TEAM_ID ASC_KEY_ID ASC_ISSUER_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name is missing. Add it as a GitHub secret or one of the supported aliases in this workflow."
              missing=1
            fi
          done
          if [[ -z "${ASC_PRIVATE_KEY:-}" && -z "${ASC_PRIVATE_KEY_BASE64:-}" ]]; then
            echo "::error::App Store Connect private key is missing. Add APP_STORE_CONNECT_PRIVATE_KEY, ASC_PRIVATE_KEY, APP_STORE_CONNECT_PRIVATE_KEY_BASE64, or ASC_PRIVATE_KEY_BASE64."
            missing=1
          fi
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Write App Store Connect API key
        id: asc_key
        run: |
          set -euo pipefail
          key_dir="$RUNNER_TEMP/private_keys"
          key_path="$key_dir/AuthKey_${ASC_KEY_ID}.p8"
          mkdir -p "$key_dir"
          if [[ -n "${ASC_PRIVATE_KEY_BASE64:-}" ]]; then
            printf '%s' "$ASC_PRIVATE_KEY_BASE64" | base64 --decode > "$key_path"
          else
            printf '%s' "$ASC_PRIVATE_KEY" | sed 's/\\n/\n/g' > "$key_path"
          fi
          chmod 600 "$key_path"
          if ! grep -q "PRIVATE KEY" "$key_path"; then
            echo "::error::The resolved App Store Connect private key does not look like a .p8 private key. Check the selected GitHub secret value."
            exit 1
          fi
          echo "path=$key_path" >> "$GITHUB_OUTPUT"
          mkdir -p "$HOME/private_keys"
          cp "$key_path" "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Install optional signing certificate and profile
        if: ${{ env.APPLE_CERTIFICATE_P12_BASE64 != '' || env.APPLE_PROVISIONING_PROFILE_BASE64 != '' }}
        run: |
          set -euo pipefail
          if [[ -n "${APPLE_CERTIFICATE_P12_BASE64:-}" ]]; then
            certificate_path="$RUNNER_TEMP/apple_distribution.p12"
            keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
            keychain_password="${KEYCHAIN_PASSWORD:-freshflow-ci-keychain}"
            printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"
            security create-keychain -p "$keychain_password" "$keychain_path"
            security set-keychain-settings -lut 21600 "$keychain_path"
            security unlock-keychain -p "$keychain_password" "$keychain_path"
            security import "$certificate_path" -P "${APPLE_CERTIFICATE_PASSWORD:-}" -A -t cert -f pkcs12 -k "$keychain_path"
            security list-keychain -d user -s "$keychain_path"
            security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          fi
          if [[ -n "${APPLE_PROVISIONING_PROFILE_BASE64:-}" ]]; then
            mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
            printf '%s' "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/FreshFlowAI.mobileprovision"
          fi

      - name: Resolve package and project metadata
        run: |
          set -euo pipefail
          xcodebuild -list -project "$PROJECT_PATH"

      - name: Build for simulator without signing
        run: |
          set -euo pipefail
          log_path="$RUNNER_TEMP/simulator-build.log"
          if ! xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            clean build 2>&1 | tee "$log_path"; then
            echo "::group::Xcode simulator build errors"
            grep -E "error:|BUILD FAILED" "$log_path" | tail -n 80 || true
            echo "::endgroup::"
            grep -E "error:|BUILD FAILED" "$log_path" | tail -n 20 | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit 65
          fi

      - name: Archive iOS app
        run: |
          set -euo pipefail
          archive_path="$RUNNER_TEMP/${APP_NAME}.xcarchive"
          log_path="$RUNNER_TEMP/archive.log"
          if ! xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=iOS' \
            -archivePath "$archive_path" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.asc_key.outputs.path }}" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            clean archive 2>&1 | tee "$log_path"; then
            echo "::group::Xcode archive errors"
            grep -E "error:|BUILD FAILED|ARCHIVE FAILED" "$log_path" | tail -n 80 || true
            echo "::endgroup::"
            grep -E "error:|BUILD FAILED|ARCHIVE FAILED" "$log_path" | tail -n 20 | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit 65
          fi
          echo "ARCHIVE_PATH=$archive_path" >> "$GITHUB_ENV"

      - name: Create export options
        run: |
          set -euo pipefail
          export_method="app-store-connect"
          if ! xcodebuild -help | grep -q "app-store-connect"; then
            export_method="app-store"
          fi
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>manageAppVersionAndBuildNumber</key>
            <true/>
            <key>method</key>
            <string>${export_method}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          plutil -lint "$RUNNER_TEMP/ExportOptions.plist"

      - name: Export IPA
        run: |
          set -euo pipefail
          export_path="$RUNNER_TEMP/export"
          mkdir -p "$export_path"
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$export_path" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.asc_key.outputs.path }}" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
          ipa_path="$(find "$export_path" -name '*.ipa' -print -quit)"
          if [[ -z "$ipa_path" ]]; then
            echo "::error::No IPA was exported."
            exit 1
          fi
          echo "IPA_PATH=$ipa_path" >> "$GITHUB_ENV"
          ls -lh "$ipa_path"

      - name: Upload IPA to App Store Connect
        run: |
          set -euo pipefail
          log_path="$RUNNER_TEMP/altool-upload.log"
          if ! xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose 2>&1 | tee "$log_path"; then
            echo "::group::App Store Connect upload errors"
            grep -Ei "error|failed|invalid|unable|unauthorized|authentication|provider|bundle|version|transport" "$log_path" | tail -n 120 || true
            echo "::endgroup::"
            grep -Ei "error|failed|invalid|unable|unauthorized|authentication|provider|bundle|version|transport" "$log_path" | tail -n 30 | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit 1
          fi

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FreshFlowAI-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: ignore
